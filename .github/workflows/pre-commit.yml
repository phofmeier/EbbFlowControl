name: pre_commit

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "**"

jobs:
  pre_commit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout (GitHub)
        uses: actions/checkout@v6
      - name: Install dependencies
        run: sudo apt install -y cppcheck
      - uses: pre-commit/action@v3.0.1
        with:
          extra_args: --show-diff-on-failure --all-files
