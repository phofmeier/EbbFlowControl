name: Create Release

on:
  push:
    # Sequence of patterns matched against refs/tags
    tags:
      - "v*" # Push events to matching v*, i.e. v1.0, v20.15.10

jobs:
  create_release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    steps:
      - name: Get version from tag
        id: tag_name
        run: |
          echo "current_version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        shell: bash
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and run Dev Container task
        uses: devcontainers/ci@v0.3
        with:
          # Change this to point to your image name
          imageName: ghcr.io/${{ github.repository_owner }}/ebbflowcontrol-devcontainer
          # Change this to be your CI task/script
          runCmd: |
            ./build_all.sh
      - name: Zip factory build files
        run: |
          set -euo pipefail
          FLASH_ARGS="./build_factory/flash_project_args"
          test -f "$FLASH_ARGS"
          mapfile -t bins < <(awk 'NR > 1 {print "./build_factory/"$2}' "$FLASH_ARGS")
          if [[ ${#bins[@]} -eq 0 ]]; then
            echo "No binary paths parsed from $FLASH_ARGS"
            exit 1
          fi
          extras=(
            EbbFlowControl-Setup_wifi_qr.png
            EbbFlowControl-Setup_connection_url_qr.png
            "$FLASH_ARGS"
          )
          for f in "${extras[@]}"; do
            test -f "$f" || { echo "Missing required file: $f"; exit 1; }
          done
          echo "Zipping ${#bins[@]} firmware files plus extras"
          zip FactoryBuildFiles.zip "${bins[@]}" "${extras[@]}"
      - name: Get Changelog Entry
        id: changelog_reader
        uses: mindsers/changelog-reader-action@v2
        with:
          validation_level: warn
          version: ${{ steps.tag_name.outputs.current_version }}
          path: ./CHANGELOG.md
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ steps.changelog_reader.outputs.version }}
          body: ${{ steps.changelog_reader.outputs.changes }}
          prerelease: ${{ steps.changelog_reader.outputs.status == 'prereleased' }}
          draft: ${{ steps.changelog_reader.outputs.status == 'unreleased' }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_on_unmatched_files: true
          files: |
            ./build_app/EbbFlowControl.bin
            FactoryBuildFiles.zip
